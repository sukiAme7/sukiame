guestbook:
  title: Guestbook
  subtitle: Little Notes
  url: /guestbook/
  icon: fa-solid fa-message
  count_label: Notes
  note: A sky of sticky notes, each one carrying a little warmth.
  composer:
    title: Write a Note
    subtitle: Leave a little hello for the next visitor.
    button: Start Writing
    tone: peach
    x: 82
    y: 42
    width: 214
    rotate: -8
  items:
    - author: Rainy
      date: 2026.03.22
      tone: yellow
      message: This homepage feels airy and calm, like opening a window on a light rainy day.
      x: 8
      y: 16
      width: 214
      rotate: -10
    - author: Momo
      date: 2026.03.21
      tone: pink
      message: The sticky-note layout is lovely. It already feels like a tiny hand-made wall.
      x: 30
      y: 12
      width: 208
      rotate: 6
    - author: Kiko
      date: 2026.03.20
      tone: blue
      message: Leaving a short hello here. Hope your next page turns out exactly how you imagined.
      x: 54
      y: 18
      width: 218
      rotate: -8
    - author: Sora
      date: 2026.03.18
      tone: green
      message: This board would be such a cozy corner once more real notes start to appear.
      x: 78
      y: 14
      width: 204
      rotate: 11

friends:
  title: Friends
  subtitle: Gentle Corners Of The Web
  url: /friends/
  icon: fa-solid fa-link
  count_label: Sites
  note: A few lovely places worth keeping close.
  exchange_title: Link Exchange
  exchange_copy: If your site has its own style and a little warmth, I would love to exchange links.
  exchange_rules:
    - Stable personal or indie site
    - Original writing or thoughtful curation
    - HTTPS available and no broken layout
  items:
    - name: Paper Rain
      url: https://example.com
      avatar: https://api.dicebear.com/9.x/glass/svg?seed=paper-rain
      description: Small essays, frontend sketches, and soft web experiments.
      tags:
        - Blog
        - Coding
      accent: blue
    - name: Mint Lab
      url: https://example.com
      avatar: https://api.dicebear.com/9.x/glass/svg?seed=mint-lab
      description: A calm lab for frontend tinkering, tiny widgets, and UI drafts.
      tags:
        - Frontend
        - UI
      accent: green
    - name: Night Shelf
      url: https://example.com
      avatar: https://api.dicebear.com/9.x/glass/svg?seed=night-shelf
      description: Reading logs, favorite quotes, and a shelf of long-form notes.
      tags:
        - Reading
        - Notes
      accent: peach

