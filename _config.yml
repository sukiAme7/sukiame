guestbook:
  title: Guestbook
  subtitle: Little Notes
  url: /guestbook/
  icon: fa-solid fa-message
  count_label: Notes
  note: A sky of sticky notes, each one carrying a little warmth.
  composer:
    title: Write a Note
    subtitle: Leave a little hello for the next visitor.
    button: Start Writing
    tone: peach
    x: 82
    y: 42
    width: 214
    rotate: -8
  items:
    - author: 雨天
      date: 2026.03.22
      tone: yellow
      message: 首页的氛围真的很舒服，像是下雨天打开窗时吹进来的那一阵风。
      x: 8
      y: 16
      width: 214
      rotate: -10
    - author: Momo
      date: 2026.03.21
      tone: pink
      message: 留言板做成便利贴这个想法太可爱了，已经开始期待后面的真实留言版本。
      x: 30
      y: 12
      width: 208
      rotate: 6
    - author: Kiko
      date: 2026.03.20
      tone: blue
      message: 来踩踩，顺便留下一句加油。愿你写的每个页面都有自己独特的小情绪。
      x: 54
      y: 18
      width: 218
      rotate: -8
    - author: 星屑
      date: 2026.03.20
      tone: green
      message: 我很喜欢这种可以随手拖动的感觉，好像真的在桌面上摆便利贴。
      x: 78
      y: 14
      width: 204
      rotate: 11
    - author: Nagi
      date: 2026.03.18
      tone: lavender
